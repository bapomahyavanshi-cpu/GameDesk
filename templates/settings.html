{% load static %}

<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings | Game Desk</title>
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head><body><div class="settings-container"><h2>⚙ Appearance</h2><div class="setting-card"><label>
<input type="radio" name="theme" value="dark" onclick="setTheme('dark')">
Dark Mode
</label><br><br>

<label>
<input type="radio" name="theme" value="light" onclick="setTheme('light')">
Light Mode
</label></div></div><script>

function setTheme(mode){

localStorage.setItem("theme", mode);

if(mode === "light"){
document.body.classList.add("light-mode");
}else{
document.body.classList.remove("light-mode");
}

}

</script></body>
</html>
