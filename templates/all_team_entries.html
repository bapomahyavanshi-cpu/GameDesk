{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Team Entries | Game Desk</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="navbar">
    <h2>GAME DESK</h2>
</nav>

<section class="entries-container">

    <h1 class="neon-title">Registered Teams</h1>

    <div class="entries-table-box">
        <table class="entries-table">
            <thead>
                <tr>
                    <th>No.</th>
                    <th>Team Logo</th>
                    <th>Team Name</th>
                </tr>
            </thead>
                <tbody>
{% for team in teams %}
<tr>
    <td>{{ forloop.counter }}</td>

    <td>
        {% if team.team_logo %}
            <img src="{{ team.team_logo.url }}" width="60" height="60" style="border-radius:8px;">
        {% else %}
            No Logo
        {% endif %}
    </td>

    <td>{{ team.team_name }}</td>
</tr>
{% empty %}
<tr>
    <td colspan="3">No Teams Registered Yet</td>
</tr>
{% endfor %}
</tbody>
            
        </table>
    </div>

</section>

</body>
</html>
