{% extends "base.html" %}
{% load static %}
{% load socialaccount %}

{% block content %}
<style>
    .auth-page-bg {
        background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                    url("{% static 'images/bgmi_pic2.jpg' %}") no-repeat center center fixed !important;
        background-size: cover !important;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
</style>
<div class="auth-page-bg">

    <div class="login-card-neon">

        <h2 class="text-center mb-4">Sign in to <span style="color: cyan;">GameDesk</span></h2>

        <a href="{% provider_login_url 'google' %}" class="btn btn-outline-light w-100 mb-3" style="border-radius: 8px;">
            <i class="fab fa-google"></i> Login via Google
        </a>

        <div class="text-center mb-3" style="color: #888;">OR</div>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Email or Username" required>
            
            <input type="password" name="password" placeholder="Password" required>

            <div class="d-flex justify-content-between mb-3" style="font-size: 0.9rem;">
                <label><input type="checkbox"> Remember me</label>
                <a href="{% url 'forgot_password' %}" style="color: cyan; text-decoration: none;">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">Sign in</button>
        </form>

        <p class="text-center mt-4">Don't have an account? <a href="{% url 'signup' %}" style="color: cyan; text-decoration: none;">Sign up</a></p>

    </div>

</div>
{% endblock %}
