{% extends "base.html" %}
{% load socialaccount %} {% block content %}

<div class="login-wrapper">

    <div class="login-card-neon">

        <h2>Sign in to <span>GameDesk</span></h2>

        <a href="{% provider_login_url 'google' %}" class="google-btn" style="text-decoration: none; display: block; text-align: center;">
            <i class="fab fa-google"></i> Login via Google
        </a>

        <div class="divider">OR</div>
        

        <form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Email or Username" required>
    
    <input type="password" name="password" placeholder="Password" required>

    <div class="login-options">
        <label><input type="checkbox"> Remember me</label>
        <a href="#">Forgot password?</a>
    </div>

    <button type="submit" class="login-btn">Sign in</button>
</form>

        <p>Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>

    </div>

</div>

{% endblock %}
