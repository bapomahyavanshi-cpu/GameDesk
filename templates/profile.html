{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="wa-profile-wrapper">
    <div class="wa-profile-card">
        <div class="wa-header">
            <div class="wa-avatar-section">
                <img src="{% static 'images/default-user.png' %}" alt="Avatar">
                <button class="cam-icon"><i class="fas fa-camera"></i></button>
            </div>
            <div class="wa-user-main">
                <h2>{{ user.username }}</h2>
                <p class="status-text">Available | Grinding BGMI</p>
            </div>
        </div>

        <div class="wa-list">
            
            <div class="wa-item">
                <div class="wa-icon cyan-glow"><i class="fas fa-user"></i></div>
                <div class="wa-info">
                    <label>In-Game Name</label>
                    <span>{{ user.profile.ingame_name|default:"Not Set" }}</span>
                </div>
                <i class="fas fa-chevron-right arrow"></i>
            </div>

            <div class="wa-item">
                <div class="wa-icon purple-glow"><i class="fas fa-envelope"></i></div>
                <div class="wa-info">
                    <label>Email Address</label>
                    <span>{{ user.email }}</span>
                </div>
            </div>

            <div class="wa-item">
                <div class="wa-icon cyan-glow"><i class="fas fa-calendar-alt"></i></div>
                <div class="wa-info">
                    <label>Member Since</label>
                    <span>{{ user.date_joined|date:"d M, Y" }}</span>
                </div>
            </div>

            <div class="wa-item">
                <div class="wa-icon purple-glow"><i class="fas fa-trophy"></i></div>
                <div class="wa-info">
                    <label>Game Stats</label>
                    <span>Matches: 0 | Wins: 0 | Top 5: 0</span>
                </div>
                <i class="fas fa-chevron-right arrow"></i>
            </div>

        </div>

        <div class="wa-footer-actions">
            <button class="edit-btn-neon">EDIT PROFILE</button>
            <button class="logout-btn-neon">LOGOUT</button>
        </div>
    </div>
</div>
{% endblock %}
